server:
  port: ${CONFIG_SERVER_PORT:8888}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native}
  cloud:
    config:
      server:
        native:
          search-locations:
            - file:./config-data
            - file:../config-data
            - classpath:/config-data


management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always
