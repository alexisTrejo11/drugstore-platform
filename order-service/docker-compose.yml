  elasticsearch:
    image: opensearchproject/opensearch:2.9.0
    container_name: drugstore-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks:
      - drugstore-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: drugstore-logstash
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms128m"
      XPACK_MONITORING_ENABLED: "false"
    networks:
      - drugstore-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl -f http://localhost:9600/" ]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: opensearchproject/opensearch-dashboards:2.9.0
    container_name: drugstore-kibana
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    networks:
      - drugstore-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"status\":\"green\"' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  elasticsearch_data:

networks:
  drugstore-network:
    driver: bridge