plugins {
	id 'java'
	id 'org.springframework.boot' version '3.3.2'
	id 'io.spring.dependency-management' version '1.1.6'
}

group = 'at.backend.drugstore.microservice'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

repositories {
	mavenCentral()
}

ext {
	set('springBootAdminVersion', "3.3.2")
	set('springCloudVersion', "2023.0.3")
}

dependencies {
	// Spring Boot
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

	// Cache
	//implementation 'org.springframework.boot:spring-boot-starter-cache'
	//implementation 'com.github.ben-manes.caffeine:caffeine:3.1.6'

	// Config Server
	//implementation 'org.springframework.cloud:spring-cloud-starter-bootstrap'
	//implementation 'org.springframework.cloud:spring-cloud-starter-config'

	// Postgres
	//runtimeOnly 'org.postgresql:postgresql'
	//implementation 'org.postgresql:postgresql'

	// Validations
	//implementation 'org.springframework.boot:spring-boot-starter-validation'

	// Lombok
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
	testAnnotationProcessor 'org.projectlombok:lombok'

	// AutoMappers
	//implementation 'org.mapstruct:mapstruct:1.5.5.Final'
	//annotationProcessor 'org.mapstruct:mapstruct-processor:1.5.5.Final'
	//implementation 'org.modelmapper:modelmapper:2.4.4'

	// Rate Limiter
	//implementation 'com.github.vladimir-bukhtoyarov:bucket4j-core:7.6.0'
	//implementation 'com.github.vladimir-bukhtoyarov:bucket4j-jcache:7.6.0'

	// Open Api
	//implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.4.0'

	// Eureka
	// 'org.springframework.cloud:spring-cloud-starter-netflix-eureka-server'

	// Admin Service
	//implementation 'de.codecentric:spring-boot-admin-starter-client:3.0.0'
}

dependencyManagement {
	imports {
		mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
	}
}

tasks.named('test') {
	useJUnitPlatform()
}

tasks.named('bootRun') {
	jvmArgs = [
			'-Xms2g',
			'-Xmx4g',
			'-XX:MaxMetaspaceSize=256m',
			'-XX:+UseG1GC',
			'-XX:MaxGCPauseMillis=200',
			'-XX:+TieredCompilation',
			'-XX:CompileThreshold=10000'
	]
}

bootJar {
	archiveFileName = 'product-service.jar'
}

configurations.configureEach {
	resolutionStrategy.eachDependency { DependencyResolveDetails details ->
		if (details.requested.group == 'org.springdoc') {
			details.useVersion '2.4.0'
		}
	}
}