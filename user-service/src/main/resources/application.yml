spring:
  application:
    name: user-service

  # Port
  server:
    port: 8085

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false

  # Postgres - Conexión via Docker
  datasource:
    url: jdbc:postgresql://localhost:5431/drugstore_users
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  # Redis - Configuración
  data:
    redis:
      host: localhost
      port: 6378
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Cache
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

# Configuración JWT
jwt:
  secret: "dev-jwt-secret-key-for-development-only-change-in-production-123"
  issuer: "user-service-api"
  audience: "drugstore-users"
  
  # Expiration in milisecs
  access-token:
    expiration: 900000          # 15 minutos
    claims: 
      include-ip: true
      include-user-agent: true
  
  refresh-token:
    expiration: 604800000       # 7 días
    reusable: false
  
  activation-token:
    expiration: 86400000        # 24 horas


token:
  activation:
    length: 6
    expiration: 300000          # 5 minutos en dev
    allowed-attempts: 3
    block-time: 300000
  
  two-fa:
    length: 6
    expiration: 120000          # 2 minutos en dev
    allowed-attempts: 3
    block-time: 600000
  
  password-reset:
    length: 8
    expiration: 3600000         # 1 hora
    include-special-chars: true
  
  email-verification:
    length: 6
    expiration: 300000          # 5 minutos en dev
  
  # General config
  security:
    max-tokens-per-user: 5
    clean-up-interval: 300000   # 5 minutos en dev
    encryption-enabled: false   # Desactivado en dev

# Secrets para 2FA
two-fa:
  secret:
    length: 32
    algorithm: "HmacSHA1"
    time-step: 30
    digits: 6
    window: 1
  
  # Backup codes
  backup-codes:
    count: 5                    
    length: 8
    expiration: 15778463000

# Dev Rate limit
rate-limit:
  token-generation:
    max-attempts: 10           
    time-window: 3600000
  token-validation:
    max-attempts: 20
    time-window: 3600000

# Notifcation in Deve
notification:
  token:
    sms:
      enabled: false            # SMS disable on dev
      template: "Su código de verificación es: {token}"
    email:
      enabled: true
      subject: "[DEV] Su código de verificación"
      template: "templates/email-token.html"
    push:
      enabled: false

# Logging
logging:
  level:
    org.springframework: INFO
    org.springframework.data.redis: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE
    user_service: DEBUG
    com.yourpackage: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Local Test
debug: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics


