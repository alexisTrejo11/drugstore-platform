services:
  postgres:
    image: postgres:12
    container_name: drugstore_databases
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drugstore_users_db
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - drugstore-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d drugstore_users_db" ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  flyway:
    image: flyway/flyway:8.0.2
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -url=jdbc:postgresql://postgres:5432/drugstore_users_db
      - -user=postgres
      - -password=postgres
      - -connectRetries=30
      - migrate
    volumes:
      - ./src/main/resources/db/migration:/flyway/sql
    networks:
      - drugstore-network

volumes:
  postgres_data:


networks:
  drugstore-network:
