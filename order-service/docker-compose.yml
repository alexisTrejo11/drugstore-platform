services:
  postgres:
    image: postgres:15
    container_name: drugstore-postgres
    environment:
      POSTGRES_DB: drugstore_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - drugstore-network

volumes:
  postgres_data:

networks:
  drugstore-network:
    driver: bridge