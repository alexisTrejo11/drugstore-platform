server:
  port: 8081
  ssl:
    enabled: false
    key-store: classpath:keystore.p12
    key-store-password: ${STORE_SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: employee-service

spring:
  application:
    name: employee-service

  profiles:
    active: dev
  boot:
    admin:
      client:
        url: http://localhost:8080
        instance:
          service-url: http://localhost:8080
          name: employee-service

  devtools:
    restart:
      enabled: true
      exclude: static/**,public/**
      poll-interval: 1000
      quiet-period: 400
    livereload:
      enabled: true

  cache:
    type: redis
    data:
      redis:
        host: ${SPRING_REDIS_HOST:localhost}
        port: ${SPRING_REDIS_PORT:6379}
        password: ${SPRING_REDIS_PASSWORD:redispass}
        lettuce:
          pool:
            max-active: 8
            max-idle: 8
            min-idle: 0
        timeout: 2000ms

  # Postgres
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${STORE_DB:drugstore_employees}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    schemas: public
    clean-disabled: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
      cors:
        allowed-origins: "*"
        allowed-methods: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
    env:
      enabled: true
    loggers:
      enabled: true
  info:
    env:
      enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
    mail:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
  packages-to-scan:  io.github.alexisTrejo11.drugstore.employees
  paths-to-match: /api/**
  cache:
    disabled: true

app:
  rate-limit:
    global:
      enabled: true
      maxRequests: 5000
      durationHours: 1
    profiles:
      standard:
        maxRequests: 100
        durationSeconds: 60
      sensitive:
        maxRequests: 5
        durationSeconds: 300
      public:
        maxRequests: 1000
        durationSeconds: 60
      admin:
        maxRequests: 50
        durationSeconds: 1

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
  refresh-token-expiration-minutes: ${JWT_REFRESH_TOKEN_EXPIRATION_MINUTES:43200} # 30 days
  issuer: ${ISSUER}