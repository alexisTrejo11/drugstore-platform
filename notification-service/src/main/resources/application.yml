server:
  port: ${NOTIFICATION_SERVICE_PORT:8093}

spring:
  application:
    name: notification-service
  
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/notification_db}
      database: ${MONGODB_DATABASE:notification_db}
      auto-index-creation: true
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  cloud:
    config:
      enabled: ${CONFIG_SERVER_ENABLED:false}
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}
      fail-fast: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

    # Kafka Configuration
    kafka:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

      consumer:
        group-id: notification-service-group
        auto-offset-reset: earliest
        enable-auto-commit: false
        max-poll-records: 10
        fetch-min-bytes: 1
        fetch-max-wait: 500
        session-timeout-ms: 30000
        heartbeat-interval-ms: 3000
        concurrency: 3

    # Email Configuration (Gmail SMTP)
    mail:
      host: smtp.gmail.com
      port: 587
      username: ${GMAIL_USERNAME:your-email@gmail.com}
      password: ${GMAIL_APP_PASSWORD:your-app-password}
      properties:
        mail:
          smtp:
            auth: true
            starttls:
              enable: true
              required: true
            connectiontimeout: 5000
            timeout: 5000
            writetimeout: 5000

  # Twilio Configuration
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:your-account-sid}
    auth-token: ${TWILIO_AUTH_TOKEN:your-auth-token}
    phone-number: ${TWILIO_PHONE_NUMBER:+1234567890}
    enabled: ${TWILIO_ENABLED:true}

  # Notification Service Configuration
  notification:
    email:
      from-name: "Drugstore Notifications"
      reply-to: "noreply@drugstore.com"

    retry:
      max-attempts: 3
      backoff-delay-ms: 5000

  # Kafka Topics
  kafka:
    topics:
      notification:
        email-verification: notification.email-verification
        two-factor-code: notification.two-factor-code
        welcome-email: notification.welcome-email


logging:
  level:
    io.github.alexisTrejo11.drugstore: ${LOG_LEVEL:INFO}
    org.springframework.data.mongodb: ${MONGODB_LOG_LEVEL:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
