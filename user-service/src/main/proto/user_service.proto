syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.microservices.grpc.user";
option java_outer_classname = "UserServiceProto";


service UserService {
  rpc IsEmailUnique (EmailRequest) returns (BoolResponse);
  rpc IsPhoneNumberUnique (PhoneNumberRequest) returns (BoolResponse);

  rpc IsUserExistsByEmail (EmailRequest) returns (BoolResponse);
  rpc IsUserExistsByPhoneNumber (PhoneNumberRequest) returns (BoolResponse);

  rpc ValidateUserCredentials (ValidateUserCredentialsRequest) returns (ValidateUserCredentialsResponse);

  rpc GetUserByEmail(EmailRequest) returns (UserResponse);
  rpc GetUserByPhone(PhoneNumberRequest) returns (UserResponse);
  rpc GetUserById(UserIdRequest) returns (UserResponse);
}

message EmailRequest {
  string email = 1;
}

message PhoneNumberRequest {
  string phone_number = 1;
}

message UserIdRequest {
  string user_id = 1;
}

message ValidateUserCredentialsRequest {
  string email = 1;
  string password = 2;
}

message BoolResponse {
  bool value = 1;
  string message = 2;
}

message ValidateUserCredentialsResponse {
  bool is_valid = 1;
  string user_id = 2;
  string message = 3;
}

message UserResponse {
  string user_id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  string phone_number = 5;
  string role = 6;
  bool two_factor_enabled = 7;
  bool email_verified = 8;
  string status = 9;
  string created_at = 10;
  string updated_at = 11;
}

message ErrorResponse {
  string code = 1;
  string message = 2;
  repeated string details = 3;
}
