server:
  port: 8081

spring:
  application:
    name: order-service
  boot:
    admin:
      client:
        url: http://localhost:8080
        instance:
          service-url: http://localhost:8080
          name: order-service

  devtools:
    restart:
      enabled: true
      exclude: static/**,public/**
      poll-interval: 1000
      quiet-period: 400
    livereload:
      enabled: true

  cache:
    type: redis
    data:
      redis:
        host: ${SPRING_REDIS_HOST:localhost}
        port: ${SPRING_REDIS_PORT:6379}
        password: ${SPRING_REDIS_PASSWORD:redispass}
        lettuce:
          pool:
            max-active: 8
            max-idle: 8
            min-idle: 0
        timeout: 2000ms

  # Postgres
  datasource:
    url: jdbc:postgresql://localhost:5431/drugstore_orders
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    schemas: public
    clean-disabled: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
      cors:
        allowed-origins: "*"
        allowed-methods: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
    env:
      enabled: true
    loggers:
      enabled: true
  info:
    env:
      enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
    mail:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
  packages-to-scan: microservice.order_service
  paths-to-match: /api/**
  cache:
    disabled: true



logging:
  file:
    name: logs/order-service.log
    path: logs/

  level:
    libs_kernel.log.audit_logger: INFO
    microservice.order_service: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"


  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30