server:
  port: 8085

spring:
  application:
    name: payment-service

  # DataSource
  datasource:
    url: jdbc:postgresql://localhost:5432/drugstore_payments
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PaymentHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns the schema — never let Hibernate touch it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

# Stripe
stripe:
  api-key: ${STRIPE_API_KEY}                       # sk_test_xxx or sk_live_xxx
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}         # whsec_xxx from Stripe Dashboard
  # publishable-key exposed to frontend via a separate config endpoint if needed

# Logging
logging:
  level:
    root: INFO
    com.ecommerce.payment: DEBUG
    org.hibernate.SQL: WARN
    org.springframework.web: INFO
    # Set to DEBUG to log Stripe HTTP calls (verbose — use only in dev)
    com.stripe: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  # Security note: restrict this in production

