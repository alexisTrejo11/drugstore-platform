spring:
  application:
    name: order-service

  # Postgres
  datasource:
    url: jdbc:postgresql://localhost:5431/drugstore_orders
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    schemas: public
    clean-disabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
  packages-to-scan: microservice.order_service
  paths-to-match: /api/**
  cache:
    disabled: true

server:
  port: 8080