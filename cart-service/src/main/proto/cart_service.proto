syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.alexisTrejo11.drugstore.grpc.cart";

service CartService {
  rpc GetUserCart (GetUserCartRequest) returns (CartResponse);
  rpc ClearCart (ClearCartRequest) returns (ClearCartResponse);
}

message GetUserCartRequest {
  string user_id = 1;
}

message ClearCartRequest {
  string user_id = 1;
  repeated string product_ids_to_exclude = 2; // Items to keep in cart (not clear)
}

message ClearCartResponse {
  bool success = 1;
  string message = 2;
}

message CartResponse {
  string cart_id = 1;
  string customer_id = 2;
  string subtotal = 3; // Using string for BigDecimal
  string discount = 4;
  string total = 5;
  string updated_at = 6; // ISO-8601 timestamp
  repeated CartItemDetail items = 7;
  repeated AfterwardItemDetail afterwards = 8;
}

message CartItemDetail {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  string unit_price = 4;
  string discount_per_unit = 5;
  string subtotal = 6;
  string added_at = 7; // ISO-8601 timestamp
  string updated_at = 8;
}

message AfterwardItemDetail {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  string unit_price = 4;
  string discount_per_unit = 5;
  string subtotal = 6;
  string moved_at = 7; // ISO-8601 timestamp
  string updated_at = 8;
}